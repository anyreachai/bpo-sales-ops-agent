<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: letter;
            margin: 0.7in 0.7in 0.9in 0.7in;
            @frame footer {
                -pdf-frame-content: page-footer;
                bottom: 0.25in;
                margin-left: 0.7in;
                margin-right: 0.7in;
                height: 0.4in;
            }
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 10pt;
            line-height: 1.55;
            color: #1C1917;
        }

        /* ── Cover page ─────────────────────────────────────────── */
        .cover-page {
            background-color: {{ brand.primary }};
            width: 100%;
            height: 100%;
            padding: 140pt 50pt 60pt 50pt;
            page-break-after: always;
        }
        .cover-page * { color: white; }
        .cover-stripe {
            width: 50px;
            height: 5px;
            background-color: {{ brand.accent }};
            margin-bottom: 24pt;
        }
        .cover-title {
            font-size: 30pt;
            font-weight: bold;
            line-height: 1.15;
            margin-bottom: 8pt;
            letter-spacing: -0.5pt;
        }
        .cover-subtitle {
            font-size: 16pt;
            color: rgba(255,255,255,0.80) !important;
            margin-bottom: 6pt;
            font-weight: normal;
        }
        .cover-meta {
            font-size: 9pt;
            color: rgba(255,255,255,0.50) !important;
            margin-top: 28pt;
            letter-spacing: 0.2pt;
        }
        .cover-logo {
            margin-top: 40pt;
        }

        /* ── Typography ─────────────────────────────────────────── */
        h1 {
            font-size: 17pt;
            font-weight: bold;
            color: {{ brand.primary }};
            margin-top: 18pt;
            margin-bottom: 8pt;
            padding-bottom: 5pt;
            border-bottom: 2.5px solid {{ brand.accent }};
            letter-spacing: -0.3pt;
        }
        h2 {
            font-size: 13pt;
            font-weight: bold;
            color: {{ brand.secondary }};
            margin-top: 14pt;
            margin-bottom: 6pt;
        }
        h3 {
            font-size: 11pt;
            font-weight: bold;
            color: #292524;
            margin-top: 10pt;
            margin-bottom: 4pt;
        }

        p { margin-bottom: 6pt; }

        /* ── Stat cards (table layout for xhtml2pdf) ────────────── */
        .stats-row { width: 100%; margin: 14pt 0; }
        .stat-card {
            background-color: #FAFAF9;
            border: 1.5px solid #E7E5E4;
            text-align: center;
            padding: 16pt 10pt 12pt 10pt;
            width: 30%;
        }
        .stat-value {
            font-size: 28pt;
            font-weight: bold;
            color: {{ brand.accent }};
            line-height: 1.0;
        }
        .stat-label {
            font-size: 8pt;
            color: #78716C;
            text-transform: uppercase;
            letter-spacing: 0.5pt;
            margin-top: 4pt;
        }

        /* ── Tables ─────────────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10pt 0;
            font-size: 9pt;
        }
        th {
            background-color: {{ brand.primary }};
            color: white;
            font-weight: bold;
            text-align: left;
            padding: 8pt 10pt;
            font-size: 9pt;
        }
        td {
            padding: 7pt 10pt;
            border-bottom: 1px solid #E7E5E4;
            vertical-align: top;
        }
        tr.alt td { background-color: #FAFAF9; }

        /* ── Sentiment chips ────────────────────────────────────── */
        .positive { color: #15803D; background-color: #DCFCE7; padding: 2pt 6pt; font-size: 8pt; font-weight: bold; }
        .mixed    { color: #B45309; background-color: #FEF3C7; padding: 2pt 6pt; font-size: 8pt; font-weight: bold; }
        .negative { color: #B91C1C; background-color: #FEE2E2; padding: 2pt 6pt; font-size: 8pt; font-weight: bold; }

        /* ── Frequency badges ───────────────────────────────────── */
        .freq-high   { color: #B91C1C; font-weight: bold; background-color: #FEE2E2; padding: 2pt 5pt; font-size: 8pt; }
        .freq-medium { color: #B45309; font-weight: bold; background-color: #FEF3C7; padding: 2pt 5pt; font-size: 8pt; }
        .freq-low    { color: #15803D; font-weight: bold; background-color: #DCFCE7; padding: 2pt 5pt; font-size: 8pt; }

        /* ── Quote cards ────────────────────────────────────────── */
        .quote-card {
            border-left: 3px solid {{ brand.accent }};
            background-color: #FAFAF9;
            padding: 10pt 14pt;
            margin: 8pt 0;
        }
        .quote-text { font-style: italic; font-size: 9.5pt; color: #1C1917; line-height: 1.5; }
        .quote-meta { font-size: 7.5pt; color: #78716C; margin-top: 4pt; }

        /* ── Callout box ────────────────────────────────────────── */
        .callout {
            background-color: #FAFAF9;
            border: 1px solid #E7E5E4;
            border-left: 4px solid {{ brand.accent }};
            padding: 12pt 16pt;
            margin: 12pt 0;
        }
        .callout-title { font-weight: bold; font-size: 10pt; color: {{ brand.primary }}; margin-bottom: 4pt; }

        /* ── Key finding box ────────────────────────────────────── */
        .key-finding {
            background-color: {{ brand.accent }};
            color: white;
            padding: 10pt 14pt;
            margin: 10pt 0;
            font-size: 9pt;
        }
        .key-finding strong { color: white; }

        /* ── Insight card ───────────────────────────────────────── */
        .insight-card {
            background-color: #FAFAF9;
            border: 1px solid #E7E5E4;
            padding: 10pt 14pt;
            margin: 6pt 0;
        }
        .insight-title { font-weight: bold; font-size: 10pt; color: {{ brand.primary }}; margin-bottom: 3pt; }
        .insight-body { font-size: 9pt; color: #44403C; }

        /* ── Rating display ─────────────────────────────────────── */
        .rating { color: {{ brand.accent }}; font-weight: bold; font-size: 11pt; }
        .rating-bar {
            display: inline-block;
            height: 8pt;
            background-color: {{ brand.accent }};
        }
        .rating-bar-bg {
            display: inline-block;
            height: 8pt;
            width: 60pt;
            background-color: #E7E5E4;
        }

        /* ── Recommendation cards ───────────────────────────────── */
        .rec-card {
            border: 1px solid #E7E5E4;
            background-color: #FAFAF9;
            padding: 12pt 16pt;
            margin: 8pt 0;
        }
        .rec-number {
            display: inline-block;
            width: 20pt;
            height: 20pt;
            line-height: 20pt;
            text-align: center;
            background-color: {{ brand.accent }};
            color: white;
            font-size: 9pt;
            font-weight: bold;
        }
        .rec-title { font-weight: bold; color: {{ brand.primary }}; font-size: 10pt; }
        .rec-body { font-size: 9pt; color: #57534E; margin-top: 4pt; line-height: 1.5; }

        /* ── Sentiment bar (horizontal) ─────────────────────────── */
        .bar-positive { background-color: #DCFCE7; height: 14pt; display: inline-block; }
        .bar-mixed    { background-color: #FEF3C7; height: 14pt; display: inline-block; }
        .bar-negative { background-color: #FEE2E2; height: 14pt; display: inline-block; }

        /* ── Section content (markdown-rendered) ────────────────── */
        .section-content p { margin-bottom: 5pt; }
        .section-content strong { color: {{ brand.primary }}; }
        .section-content table { margin: 8pt 0; }
        .section-content ul { margin: 4pt 0 8pt 16pt; }
        .section-content li { margin-bottom: 3pt; }

        /* ── Timeline row ───────────────────────────────────────── */
        .timeline-marker {
            width: 10pt;
            height: 10pt;
            background-color: {{ brand.accent }};
            text-align: center;
            vertical-align: top;
            padding-top: 4pt;
        }
        .timeline-content {
            padding: 4pt 10pt 10pt 10pt;
            vertical-align: top;
        }

        /* ── Lists ──────────────────────────────────────────────── */
        ul, ol { margin: 4pt 0 8pt 16pt; line-height: 1.7; }
        li { margin-bottom: 2pt; }

        /* ── Page break ─────────────────────────────────────────── */
        .page-break { page-break-before: always; }

        /* ── Footer ─────────────────────────────────────────────── */
        #page-footer {
            font-size: 7pt;
            color: #A8A29E;
            text-align: center;
            border-top: 1px solid #E7E5E4;
            padding-top: 4pt;
        }

        /* ── Disclaimer ─────────────────────────────────────────── */
        .disclaimer {
            text-align: center;
            color: #A8A29E;
            font-size: 8pt;
            padding-top: 40pt;
        }
    </style>
</head>
<body>
    {% block cover %}{% endblock %}

    <div id="page-footer">
        Confidential &nbsp;|&nbsp; Anyreach.ai
    </div>

    {% block content %}{% endblock %}
</body>
</html>
