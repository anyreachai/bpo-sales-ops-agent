steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bpo-sales-ops:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bpo-sales-ops:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bpo-sales-ops
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bpo-sales-ops:$BUILD_ID
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/bpo-sales-ops:latest
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
